name: Sync public transparency log

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync.yml"
      - "scripts/sync.mjs"

permissions:
  contents: write

concurrency:
  group: sync-public-transparency-log
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out mirror
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Probe public Worker health
        run: node -e "const r = await fetch('https://fssh-anonymous-report.vic0407lu.workers.dev/api/health'); if (!r.ok) throw new Error(await r.text()); console.log(await r.text());"

      - name: Sync from public Worker API
        run: node scripts/sync.mjs

      - name: Commit mirror update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json entries roots proofs snapshots keys README.md
          if git diff --cached --quiet; then
            echo "No mirror changes to commit."
          else
            git commit -m "chore: sync public transparency log"
            git push
          fi
